<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu mundo em tinta | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pacifico&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <script src="./js/sessao.js"></script>

    <link rel="icon" href="./assets/icon/iconpallete.png">
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="stylesheet" href="./css/cadastro-login.css"/>
</head>

<body>

    <div class="home-bg home-login">
        <header class="home">
        <div class="container">
            <h1 class="titulo">Meu mundo em tinta</h1>
            <ul class="navbar">
                <li class="agora">
                    <a class="navbar-links" href="index.html">Inicial</a>
                </li>
                <li>
                    <a class="navbar-links" href="simulador.html">Texto</a>
                </li>
                <li>
                    <a class="navbar-links" href="login.html">Login</a>
                </li>
                <li>
                    <a class="navbar-links" href="cadastro.html">Cadastro</a>
                </li>
            </ul>
        </div>
        </header>

        <div class="container-login">
            <div class="alerta_erro">
                <div class="card_erro" id="cardErro">
                    <span id="mensagem_erro"></span>
                </div>
            </div>

            <div class="card card-login">
                <div class="lado-esquerdo">
                    <h2 class="titulo-login">Que bom te ver<br><span class="span-msg-login">por aqui! <img src="assets/icon/coracao.png" alt="Coração" class="icon-span-login"></span></h2>
                    <p class="txt-login">Entre para continuar conhecendo o mundo da arte, das cores e da criatividade.</p>
                    <img src="assets/imgs/flores-login.png" alt="Flores em aquarela" class="img-principal-login">
                </div>

                <div class="lado-direito">
                    <div class="formulario">
                        <div class="campo">
                            <span class="campo-login">E-mail:</span>
                            <input id="email_input" type="text" placeholder="Digite seu e-mail">
                        </div>
                        <div class="campo">
                            <span class="campo-login">Senha:</span>
                            <input id="senha_input" type="password" placeholder="******">
                        </div>

                        <div id="div_aguardar" class="loading-div">
                            <img src="./assets/circle-loading.gif" id="loading-gif">
                        </div>

                        <div id="div_erros_login"></div> 

                        <button class="botao" onclick="entrar()">Entrar</button>

                        <p class="cadastrar">Ainda não tem conta? <span class="campo-cadastrar"><a href="cadastro.html">Cadastre-se</a></span></p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="rodape-login-cadastro">
            <p>Criado com carinho por Raissa Nascimento 🎨</p>
        </footer>
    </div>  
</body>
</html>
<script>
    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
